ize:10px;color:#1976D2'>alltrails.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Torrey Pines – Razor Point & Beach Trail Loop\" data-type=\"Hike\" data-lat=\"32.921\" data-lon=\"-117.252\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#7B1FA2;font-size:13px'>Sunset Cliffs Natural Park<\/b><br><span style='font-size:11px;color:#666'>Ocean Beach / Point Loma, San Diego<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>1.5 mi RT<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>50 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#7B1FA2'>Moderate<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>San Diego's most dramatic coastal walk — volcanic reef exposed at sunset, sea caves, tidepools, sea lions hauled out on rocks. Best at low tide. Completely free.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> Free. Street parking in Ocean Beach / Point Loma.<\/p><a href='https://www.sandiego.gov/park-and-recreation/parks/regional/sunset' target='_blank' style='font-size:10px;color:#1976D2'>sandiego.gov<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Sunset Cliffs Natural Park\" data-type=\"Hike\" data-lat=\"32.716\" data-lon=\"-117.254\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#7B1FA2;font-size:13px'>Cowles Mountain Summit Trail<\/b><br><span style='font-size:11px;color:#666'>Mission Trails Regional Park, San Diego<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>3 mi RT<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>941 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#7B1FA2'>Moderate<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>SD's most popular peak — panoramic 360° view of the city, ocean, Mexico, mountains. Early morning for best clarity and cooler temps. Busiest trailhead in SD — go before 8am.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> Free. Cowles Mountain main lot fills early on weekends — arrive before 8am.<\/p><a href='https://www.alltrails.com/trail/us/california/cowles-mountain-trail' target='_blank' style='font-size:10px;color:#1976D2'>alltrails.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Cowles Mountain Summit Trail\" data-type=\"Hike\" data-lat=\"32.812\" data-lon=\"-117.044\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#C62828;font-size:13px'>Rocky Ridge – Soberanes Canyon Loop<\/b><br><span style='font-size:11px;color:#666'>Garrapata SP, Big Sur<\/span><div style='background:#FFF3E0;border-left:3px solid #E65100;padding:4px 6px;margin:4px 0;font-size:10px;color:#BF360C'>⚠ Rocky Ridge section closed (hazardous conditions) — canyon out-and-back open. Check parks.ca.gov.<\/div><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>4.6 mi loop<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>1,850 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#C62828'>Hard<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Brutal climb from redwood canyon to open ridge — jaw-dropping Big Sur coast views. Best wildflowers in spring.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> No permit. Free parking.<\/p><a href='https://www.alltrails.com/explore/recording/garrapata-state-park-rocky-ridge-to-soberanes-canyon-loop' target='_blank' style='font-size:10px;color:#1976D2'>alltrails.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Rocky Ridge – Soberanes Canyon Loop\" data-type=\"Hike\" data-lat=\"36.455\" data-lon=\"-121.924\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#E65100;font-size:13px'>Ridge–Panorama–Bluffs Loop<\/b><br><span style='font-size:11px;color:#666'>Andrew Molera SP, Big Sur<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>8.7 mi loop<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>1,100 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#E65100'>Mod-Hard<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Best full-day Big Sur loop: ridge views of Santa Lucia Range → coastal panoramas → raw cliffscape beach. Best combo on the coast.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> $10 day-use parking. No permit.<\/p><a href='https://www.hikespeak.com/trails/ridge-panorama-bluff-trails-loop-andrew-molera-state-park/' target='_blank' style='font-size:10px;color:#1976D2'>hikespeak.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Ridge–Panorama–Bluffs Loop\" data-type=\"Hike\" data-lat=\"36.287\" data-lon=\"-121.844\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#E65100;font-size:13px'>Ewoldsen Trail<\/b><br><span style='font-size:11px;color:#666'>Julia Pfeiffer Burns SP, Big Sur<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>5 mi loop<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>1,522 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#E65100'>Mod-Hard<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Far better than the McWay Falls tourist overlook — climbs to 180° ocean views with the falls far below. Substantial lung-burner.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> $10 day-use parking. No permit. East loop closed (Dolan Fire) — check status.<\/p><a href='https://modernhiker.com/hike/hike-the-ewoldsen-trail-in-julia-pfeiffer-burns-state-park/' target='_blank' style='font-size:10px;color:#1976D2'>modernhiker.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Ewoldsen Trail\" data-type=\"Hike\" data-lat=\"36.168\" data-lon=\"-121.666\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#7B1FA2;font-size:13px'>Point Lobos Full Outer Loop<\/b><br><span style='font-size:11px;color:#666'>Point Lobos SNR<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>6–7 mi loop<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>400 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#7B1FA2'>Moderate<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Crown Jewel of CA State Parks. North Shore Trail (strong walkers only) threads above sea lion colonies & kelp forest. Wildlife density is extraordinary.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> Advance parking reservation required (ParkIT!). $10/vehicle.<\/p><a href='https://www.pointlobos.org/trails/' target='_blank' style='font-size:10px;color:#1976D2'>pointlobos.org<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Point Lobos Full Outer Loop\" data-type=\"Hike\" data-lat=\"36.516\" data-lon=\"-121.943\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#C62828;font-size:13px'>James Irvine – Miners Ridge – Fern Canyon<\/b><br><span style='font-size:11px;color:#666'>Prairie Creek Redwoods SP<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>12 mi loop<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>2,685 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#C62828'>Hard<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Definitive full-day Redwoods hike. Old-growth James Irvine Trail → Fern Canyon (Jurassic Park location) → elk on Gold Bluffs Beach → back via Miners Ridge.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> No permit from Visitor Center start. Fern Canyon parking reservation needed May 15–Sep 15 via recreation.gov.<\/p><a href='https://www.nps.gov/thingstodo/jamesirvine-ferncanyonloop.htm' target='_blank' style='font-size:10px;color:#1976D2'>nps.gov/redw<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"James Irvine – Miners Ridge – Fern Canyon\" data-type=\"Hike\" data-lat=\"41.372\" data-lon=\"-124.029\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#E65100;font-size:13px'>Tall Trees Grove<\/b><br><span style='font-size:11px;color:#666'>Redwood National Park<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>4.5 mi RT<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>800 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#E65100'>Mod-Hard<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Some of the tallest trees on Earth in near-total solitude. Deliberately hard to reach (800ft descent + climb out) to keep crowds away.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> Free permit required (50 parties/day max). Book 48 hrs–4 weeks ahead at recreation.gov.<\/p><a href='https://www.nps.gov/thingstodo/talltreeshike.htm' target='_blank' style='font-size:10px;color:#1976D2'>nps.gov/redw<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Tall Trees Grove\" data-type=\"Hike\" data-lat=\"41.27\" data-lon=\"-124.002\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#7B1FA2;font-size:13px'>Boy Scout Tree Trail to Fern Falls<\/b><br><span style='font-size:11px;color:#666'>Jedediah Smith Redwoods SP<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>5.9 mi RT<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>1,220 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#7B1FA2'>Moderate<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Only deep interior hike in Jedediah Smith — entire trail through pristine first-growth forest. Enormous trees. Ends at a lovely waterfall.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> Day-use parking fee. No permit.<\/p><a href='https://www.nps.gov/places/boyscouttreetrail.htm' target='_blank' style='font-size:10px;color:#1976D2'>nps.gov/redw<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Boy Scout Tree Trail to Fern Falls\" data-type=\"Hike\" data-lat=\"41.769\" data-lon=\"-124.11\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#E65100;font-size:13px'>Neahkahnie Mountain<\/b><br><span style='font-size:11px;color:#666'>Oswald West SP, Oregon<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>3.4 mi RT<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>900–1,220 ft<\/b><\/td><\ /p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> Free. Oswald West main parking.<\/p><a href='https://www.themandagies.com/oregon-coast-hikes/' target='_blank' style='font-size:10px;color:#1976D2'>themandagies.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Cape Falcon Trail\" data-type=\"Hike\" data-lat=\"45.765\" data-lon=\"-123.965\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#7B1FA2;font-size:13px'>Cape Lookout Trail<\/b><br><span style='font-size:11px;color:#666'>Cape Lookout SP, Oregon<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>4.7 mi RT<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>400–810 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#7B1FA2'>Moderate<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Cape Lookout juts 1.5 miles into open Pacific — sheer cliffs both sides, rainforest ridge spine, prime whale viewing point in season.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> $5 day-use parking.<\/p><a href='https://www.hikespeak.com/trails/cape-lookout-hike-oregon/' target='_blank' style='font-size:10px;color:#1976D2'>hikespeak.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Cape Lookout Trail\" da 6'>Cape Perpetua Scenic Area, Oregon<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>2.7–7.2 mi<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>700–800 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#7B1FA2'>Moderate<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Highest viewpoint directly on the OR coast (800 ft, 150-mile ocean view). Sitka spruce old-growth + Thor's Well / Devil's Churn tidal features at base.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> $5 day-use / NW Forest Pass.<\/p><a href='https://oregondiscovery.com/cape-perpetua' target='_blank' style='font-size:10px;color:#1976D2'>oregondiscovery.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Cape Perpetua / Amanda's Trail\" data-type=\"Hike\" data-lat=\"44.28\" data-lon=\"-124.108\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#C62828;font-size:13px'>High Divide – Seven Lakes Basin<\/b><br><span style='font-size:11px;color:#666'>Olympic NP (Sol Duc)<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>19 mi loop<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>4,000 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#C62828'>Hard<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>⭐ TOP PICK. Best trail in Washington. High ridge with 360° glaciers + Hoh valley + Pacific views. Seven Lakes Basin = turquoise alpine lakes. Overnight strongly recommended.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> Day hike: no permit. Overnight: wilderness permit $8/person/night + $6 fee via recreation.gov (from Apr 15).<\/p><a href='https://www.nps.gov/olym/planyourvisit/high-divide-loop.htm' target='_blank' style='font-size:10px;color:#1976D2'>nps.gov/olym + wta.org<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"High Divide – Seven Lakes Basin\" data-type=\"Hike\" data-lat=\"47.975\" data-lon=\"-124.158\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#C62828;font-size:13px'>Klahhane Ridge to Mt. Angeles<\/b><br><span style='font-size:11px;color:#666'>Olympic NP (Hurricane Ridge)<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>5.6 mi RT<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>2,200 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#C62828'>Hard<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Off-the-beaten-path Hurricane Ridge route. Limestone wildflower ridge walk with expanding views — Strait of Juan de Fuca, Vancouver Island, Mt. Baker.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> $35/vehicle park pass (7-day). No trail permit.<\/p><a href='https://www.wta.org/go-hiking/hikes/klahhane-ridge' target='_blank' style='font-size:10px;color:#1976D2'>wta.org<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Klahhane Ridge to Mt. Angeles\" data-type=\"Hike\" data-lat=\"47.987\" data-lon=\"-123.461\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#7B1FA2;font-size:13px'>Hoh River Trail (day hike to Five Mile Island)<\/b><br><span style='font-size:11px;color:#666'>Olympic NP (Hoh Rainforest)<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>10.6 mi RT<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>500 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#7B1FA2'>Moderate<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Hoh Rainforest at its most immersive — bigleaf maples draped in hanging moss, Roosevelt elk grazing, deepest temperate rainforest in North America.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> $35/vehicle park pass. Wilderness permit for overnight.<\/p><a href='https://www.wta.org/go-hiking/hikes/hoh-river-blue-glacier' target='_blank' style='font-size:10px;color:#1976D2'>wta.org<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Hoh River Trail (day hike to Five Mile Island)\" data-type=\"Hike\" data-lat=\"47.86\" data-lon=\"-123.934\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#C62828;font-size:13px'>Pyramid Mountain (Lake Crescent)<\/b><br><span style='font-size:11px;color:#666'>Olympic NP (Lake Crescent)<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>7 mi RT<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>2,600 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#C62828'>Hard<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Lake Crescent's best-kept secret. Active landslide traverse + exposed summit views. Less than 10% of Olympic visitors know this trail.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> $35/vehicle park pass. No trail permit.<\/p><a href='https://www.wta.org/go-hiking/hikes/pyramid-mountain-1' target='_blank' style='font-size:10px;color:#1976D2'>wta.org + hikeolympic.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Pyramid Mountain (Lake Crescent)\" data-type=\"Hike\" data-lat=\"48.063\" data-lon=\"-123.869\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#880E4F;font-size:13px'>Enchanted Valley<\/b><br><span style='font-size:11px;color:#666'>Olympic NP (Quinault)<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-size:11px;border-collapse:collapse;width:100%'><tr><td style='color:#888;padding:1px 6px 1px 0'>Distance<\/td><td><b>27.8 mi RT<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>3,700 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#880E4F'>Hard (backpack)<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Valley of 1,000 Waterfalls. Old-growth rainforest → glacially carved bowl with waterfalls from every wall + 1930s chalet. Multi-day objective.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> Wilderness permit $8/person/night + $6 fee via recreation.gov.<\/p><a href='https://www.wta.org/go-hiking/hikes/enchanted-valley' target='_blank' style='font-size:10px;color:#1976D2'>wta.org<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Enchanted Valley\" data-type=\"Hike\" data-lat=\"47.566\" data-lon=\"-123.598\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style='font-family:sans-serif;max-width:280px'><b style='color:#C62828;font-size:13px'>Skyline Trail Loop (Paradise)<\/b><br><span style='font-size:11px;color:#666'>Mt. Rainier NP, WA (~2 hrs from Seattle)<\/span><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><table style='font-siz or:#888;padding:1px 6px 1px 0'>Elev gain<\/td><td><b>1,800 ft<\/b><\/td><\/tr><tr><td style='color:#888;padding:1px 6px 1px 0'>Difficulty<\/td><td><b style='color:#C62828'>Hard<\/b><\/td><\/tr><\/table><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:11px;color:#444;margin:3px 0;line-height:1.5'>Quieter than Paradise, better wildflowers. Passes Spray Falls (tallest in the park) → open parkland with full-face Rainier views.<\/p><hr style='margin:5px 0;border:none;border-top:1px solid #eee'><p style='font-size:10px;color:#777;margin:2px 0'><b>Permits:<\/b> ⚠ Mowich Lake road may be closed (bridge washout). Check nps.gov/mora before visiting. $35/vehicle park pass.<\/p><a href='https://www.nps.gov/mora/planyourvisit/spray-park.htm' target='_blank' style='font-size:10px;color:#1976D2'>nps.gov/mora<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Spray Park Trail\" data-type=\"Hike\" data-lat=\"46.932\" data-lon=\"-121.863\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>"],null,["🥾 Torrey Pines – Razor Point &amp; Beach Trail Loop · 3.5 mi loop · Moderate","🥾 Sunset Cliffs Natural Park · 1.5 mi RT · Moderate","🥾 Cowles Mountain Summit Trail · 3 mi RT · Moderate","🥾 Rocky Ridge – Soberanes Canyon Loop · 4.6 mi loop · Hard","🥾 Ridge–Panorama–Bluffs Loop · 8.7 mi loop · Mod-Hard","🥾 Ewoldsen Trail · 5 mi loop · Mod-Hard","🥾 Point Lobos Full Outer Loop · 6–7 mi loop · Moderate","🥾 James Irvine – Miners Ridge – Fern Canyon · 12 mi loop · Hard","🥾 Tall Trees Grove · 4.5 mi RT · Mod-Hard","🥾 Boy Scout Tree Trail to Fern Falls · 5.9 mi RT · Moderate","🥾 Neahkahnie Mountain · 3.4 mi RT · Mod-Hard","🥾 Cape Falcon Trail · 5 mi RT · Moderate","🥾 Cape Lookout Trail · 4.7 mi RT · Moderate","🥾 Saddle Mountain · 5 mi RT · Hard","🥾 Cape Perpetua / Amanda's Trail · 2. dding:1px 6px 1px 0\">Cert needed<\/td><td><b>None<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Warmest snorkeling on the entire route — no wetsuit needed in July. Leopard sharks (harmless, summer gathering), California sea lions hauled out on the rocks, garibaldi (CA state fish), bat rays, giant kelp, octopus. Shore entry right from the beach. Part of a protected Marine Reserve.<\/p><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:10px;color:#666;margin:2px 0\">Shore snorkel — no guide needed. Gear hire: Bike & Kayak Tours La Jolla (bikeandkayaktours.com) or The Snorkel Store (thesnorkelstore.com, ~$15/day). Guided kayak + snorkel tours from La Jolla Kayak: lajollakayak.com<\/p><a href=\"https://www.lajollakayak.com/snorkeling-tours/\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.lajollakayak.com/snorkeling-tours/<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"La Jolla Cove\" data-type=\"Snorkel / Dive\" data-lat=\"32.85\" data-lon=\"-117.273\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#0288D1;font-size:13px\">🤿 Channel Islands NP — Scorpion Cove<\/b><br><span style=\"font-size:11px;color:#555\">🔴 Book now<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Quality<\/td><td><b style=\"color:#0288D1\">Excellent<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Water temp<\/td><td><b>60–70°F<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Wetsuit<\/td><td><b>5–7mm<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Cert needed<\/td><td><b>None<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Giant kelp forests (70 ft tall), garibaldi, sheephead, harbour seals (very playful), sea lions, moray eels, nudibranchs, spiny lobster. Warmest and most biodiverse site on the route.<\/p><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:10px;color:#666;margin:2px 0\">Channel Islands Adventure Co (CIAC) — guided snorkel + 7mm gear hire ~$159+ferry. Book well ahead. islandkayaking.com | Island Packers ferry: islandpackers.com<\/p><a href=\"https://www.nps.gov/chis/planyourvisit/diving.htm\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.nps.gov/chis/planyourvisit/diving.htm<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Channel Islands NP — Scorpion Cove\" data-type=\"Snorkel / Dive\" data-lat=\"33.988\" data-lon=\"-119.552\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#0277BD;font-size:13px\">🤿 Point Lobos SNR — Whalers Cove<\/b><br><span style=\"font-size:11px;color:#555\">🔴 Book now<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Quality<\/td><td><b style=\"color:#0277BD\">World-class<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Water temp<\/td><td><b>54–58°F<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Wetsuit<\/td><td><b>7mm + hood + gloves<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Cert needed<\/td><td><b>None (permit req'd)<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Crown Jewel of CA State Parks. 70-ft kelp walls, lingcod, cabezon, vermillion rockfish, harbour seals, sea otters, giant sea bass (rare), wolf eels, nudibranchs. World-famous.<\/p><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:10px;color:#666;margin:2px 0\">Self-guided only (no tours inside reserve). Reserve at parks.ca.gov — $20 weekday/$30 weekend + $10 entry. BOOK NOW — summer fills weeks ahead. Buddy required.<\/p><a href=\"https://www.parks.ca.gov/?page_id=28353\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.parks.ca.gov/?page_id=28353<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Point Lobos SNR — Whalers Cove\" data-type=\"Snorkel / Dive\" data-lat=\"36.516\" data-lon=\"-121.943\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#0288D1;font-size:13px\">🤿 Monterey Bay — San Carlos Beach<\/b><br><span style=\"font-size:11px;color:#555\">⭐ Top pick<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Quality<\/td><td><b style=\"color:#0288D1\">Excellent<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Water temp<\/td><td><b>54–62°F<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Wetsuit<\/td><td><b>7mm + hood + gloves<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Cert needed<\/td><td><b>None<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Sea otters (June–Aug best for pups!), giant kelp, 20+ species of rockfish, lingcod, bat rays, leopard sharks, metridium anemone fields. Premier freediving hub in NorCal.<\/p><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:10px;color:#666;margin:2px 0\">MBAY Freediving (225 Cannery Row) — intro guided ocean freediving, no cert needed. montereyexpeditions.com for snorkel tours. Bamboo Reef for gear hire.<\/p><a href=\"https://montereyexpeditions.com\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://montereyexpeditions.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Monterey Bay — San Carlos Beach\" data-type=\"Snorkel / Dive\" data-lat=\"36.62\" data-lon=\"-121.901\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#039BE5;font-size:13px\">🤿 Lovers Point (Pacific Grove)<\/b><br><span style=\"font-size:11px;color:#555\">Good stop<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Quality<\/td><td><b style=\"color:#039BE5\">Good<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Water temp<\/td><td><b>54–62°F<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Wetsuit<\/td><td><b>7mm recommended<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Cert needed<\/td><td><b>None<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Kelp forest cove, sea otters, seals, rockfish. Calmer than open coast. Excellent for snorkellers.<\/p><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:10px;color:#666;margin:2px 0\">Shore entry — no guided tours needed. Gear hire from Monterey/Pacific Grove dive shops nearby.<\/p><a href=\"https://www.montereylocals.com/lovers-point-park\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.montereylocals.com/lovers-point-park<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Lovers Point (Pacific Grove)\" data-type=\"Snorkel / Dive\" data-lat=\"36.632\" data-lon=\"-121.93\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#039BE5;font-size:13px\">🤿 Santa Barbara — Mesa Lane / Naples Reef<\/b><br><span style=\"font-size:11px;color:#555\">Easy intro<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Quality<\/td><td><b style=\"color:#039BE5\">Good<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Water temp<\/td><td><b>55–65°F<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Wetsuit<\/td><td><b>5mm minimum<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Cert needed<\/td><td><b>None<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Kelp beds, garibaldi, rockfish, sea lions. Good intro spot — calmer than further north.<\/p><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:10px;color:#666;margin:2px 0\">Cal Coast Adventures and Santa Barbara Adventure Co offer snorkel tours and gear hire.<\/p><a href=\"https://www.calcoastadventures.com\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.calcoastadventures.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Santa Barbara — Mesa Lane / Naples Reef\" data-type=\"Snorkel / Dive\" data-lat=\"34.401\" data-lon=\"-119.714\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#26C6DA;font-size:13px\">🤿 Tomales Bay (Kayak + bat rays)<\/b><br><span style=\"font-size:11px;color:#555\">Half-day<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Quality<\/td><td><b style=\"color:#26C6DA\">Kayak only<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Water temp<\/td><td><b>54–60°F<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Wetsuit<\/td><td><b>5mm (kayak)<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Cert needed<\/td><td><b>None<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Leopard sharks, bat rays, harbour seals visible through water surface from kayak. Silty below — kayaking is the experience here.<\/p><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:10px;color:#666;margin:2px 0\">Blue Waters Kayaking half/full-day guided Tomales Bay tours. bluewaterskayaking.com<\/p><a href=\"https://bluewaterskayaking.com\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://bluewaterskayaking.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Tomales Bay (Kayak + bat rays)\" data-type=\"Snorkel / Dive\" data-lat=\"38.17\" data-lon=\"-122.932\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#80DEEA;font-size:13px\">🤿 Depoe Bay — Shore Dive Sites<\/b><br><span style=\"font-size:11px;color:#555\">Whale watching better<\/span><div style=\"background:#FFF3E0;border-left:3px solid #E65100;padding:4px 6px;margin:4px 0;font-size:10px;color:#BF360C\">⚠️ Grey whale swimming is ILLEGAL under MMPA. 100-yard exclusion enforced. Watch from shore or boat.<\/div><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Quality<\/td><td><b style=\"color:#80DEEA\">Marginal<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Water temp<\/td><td><b>54–59°F<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Wetsuit<\/td><td><b>7mm drysuit<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Cert needed<\/td><td><b>None<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Rocky reef, rockfish, lingcod, dungeness crab, giant green anemones. Cold and variable vis. Whale Cove and Otter Rock MR are the best nearby sites.<\/p><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:10px;color:#666;margin:2px 0\">Limited guided options — Whale Research EcoExcursions (Carrie Newell) for grey whale boat tours nearby. Tide pool visits at Otter Rock MR are free.<\/p><a href=\"https://www.oregondivesites.com/depoe-bay-boat-ramp/\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.oregondivesites.com/depoe-bay-boat-ramp/<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Depoe Bay — Shore Dive Sites\" data-type=\"Snorkel / Dive\" data-lat=\"44.817\" data-lon=\"-124.063\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#00ACC1;font-size:13px\">🤿 Lime Kiln Point (San Juan Islands)<\/b><br><span style=\"font-size:11px;color:#555\">⭐ Top pick<\/span><div style=\"background:#FFF3E0;border-left:3px solid #E65100;padding:4px 6px;margin:4px 0;font-size:10px;color:#BF360C\">⚠️ Orca 200-yard exclusion zone (WA state law). Passive encounters (orca swims past you) are legal — actively pursuing is not.<\/div><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Quality<\/td><td><b style=\"color:#00ACC1\">Good (cold)<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Water temp<\/td><td><b>48–53°F<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Wetsuit<\/td><td><b>7mm / drysuit<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Cert needed<\/td><td><b>None<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Bull kelp forests, giant Pacific octopus, lingcod, cabezon, Dungeness crab, nudibranchs, sea stars. Orcas sometimes swim past divers here passively (legal — you are stationary).<\/p><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:10px;color:#666;margin:2px 0\">Shore accessible at Lime Kiln Point SP — no permit needed. NW Dive Club community resource. Orca watching boats: San Juan Safaris, \/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Distance<\/td><td><b>~24 mi loop<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Elev gain<\/td><td><b>minimal<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Surface<\/td><td><b style=\"color:#006064\">Paved Trail<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Difficulty<\/td><td><b>Easy<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Bike type<\/td><td><b>Any bike<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">SD's crown jewel cycling route — 24 miles of car-free and low-traffic path around San Diego Bay. Views of the Coronado Bridge, downtown skyline, Point Loma, and Tijuana Estuary. Perfectly flat. Can combine with Coronado Island detour via ferry.<\/p><a href=\"https://www.sandag.org/projects/regional-bike-plan/bayshore-bikeway/\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">bayshorebikeways.org<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Bayshore Bikeway\" data-type=\"Bike Route\" data-lat=\"32.627\" data-lon=\"-117.116\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#1B5E20;font-size:13px\">🚴 Gibraltar Road Climb<\/b><br><span style=\"font-size:11px;color:#666\">Base: Santa Barbara<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Distance<\/td><td><b>~15 mi RT (6.1 mi climb)<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Elev gain<\/td><td><b>2,560 ft<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Surface<\/td><td><b style=\"color:#1B5E20\">Paved<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Difficulty<\/td><td><b>Hard (HC climb)<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Bike type<\/td><td><b>Road or gravel<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Most iconic climb in Southern CA — twice used as Tour of California summit finish. 8% avg, 15% max. Egan Bernal KOM: 27:12. Ocean panoramas expand with every metre gained.<\/p><a href=\"https://iconicclimbs.com/blogs/the-climbs/gibraltar-road-the-complete-guide-to-santa-barbaras-most-iconic-cycling-climb\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">iconicclimbs.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Gibraltar Road Climb\" data-type=\"Bike Route\" data-lat=\"34.438\" data-lon=\"-119.716\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#E65100;font-size:13px\">🚴 Gibraltar + E Camino Cielo + Painted Cave Loop<\/b><br><span style=\"font-size:11px;color:#666\">Base: Santa Barbara<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Distance<\/td><td><b>29.2 mi loop<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Elev gain<\/td><td><b>4,626 ft<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Surface<\/td><td><b style=\"color:#E65100\">Mixed<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Difficulty<\/td><td><b>Hard<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Bike type<\/td><td><b>Gravel recommended<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Grand tour of SB cycling: Gibraltar centrepiece + E Camino Cielo ridge views of Los Padres NF + technical Painted Cave descent. 4,626 ft of climbing in one loop.<\/p><a href=\"https://epicroadrides.com/cycling-usa/santa-barbara-county/gibraltar-road-east-camino-cielo-painted-cave-road-loop/\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">epicroadrides.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Gibraltar + E Camino Cielo + Painted Cave Loop\" data-type=\"Bike Route\" data-lat=\"34.456\" data-lon=\"-119.771\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#795548;font-size:13px\">🚴 Old Coast Road Loop<\/b><br><span style=\"font-size:11px;color:#666\">Base: SLO / Big Sur / Carmel<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Distance<\/td><td><b>18.5 mi loop<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Elev gain<\/td><td><b>~2,000 ft<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Surface<\/td><td><b style=\"color:#795548\">Gravel<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Difficulty<\/td><td><b>Moderate<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Bike type<\/td><td><b>Gravel required<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Most special ride in Big Sur — the original 19th-century wagon road built before Hwy 1 existed. Oak woodland, redwood groves, ends with a Bixby Bridge crossing. Living history on a bike.<\/p><a href=\"https://gravelbikecalifornia.com/big-sur-gravel-guide/\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">gravelbikecalifornia.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Old Coast Road Loop\" data-type=\"Bike Route\" data-lat=\"36.284\" data-lon=\"-121.864\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#1B5E20;font-size:13px\">🚴 Nacimiento-Fergusson Road<\/b><br><span style=\"font-size:11px;color:#666\">Base: SLO / Big Sur / Carmel<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Distance<\/td><td><b>13.4 mi RT (west climb)<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Elev gain<\/td><td><b>2,609 ft<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Surface<\/td><td><b style=\"color:#1B5E20\">Paved<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Difficulty<\/td><td><b>Very Hard<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Bike type<\/td><td><b>Road or gravel<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">One of the most dramatic and least-known road climbs on the CA coast. 100+ turns, condors overhead, uninterrupted Big Sur coastline views. No services for 65 miles — plan accordingly.<\/p><a href=\"https://bestrides.org/nacimiento-fergusson-road/\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">bestrides.org<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Nacimiento-Fergusson Road\" data-type=\"Bike Route\" data-lat=\"35.929\" data-lon=\"-121.482\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#1B5E20;font-size:13px\">🚴 Marin Headlands Loop<\/b><br><span style=\"font-size:11px;color:#666\">Base: San Francisco / East Bay<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Distance<\/td><td><b>23 mi<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Elev gain<\/td><td><b>1,900 ft<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Surface<\/td><td><b style=\"color:#1B5E20\">Paved<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Difficulty<\/td><td><b>Moderate<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Bike type<\/td><td><b>Road or gravel<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Quintessential SF cycling — Golden Gate Bridge, Hawk Hill aerial view, Baker-Barry Tunnel, Sausalito waterfront. The ride every SF visitor should do.<\/p><a href=\"https://marinbike.org/ride-marin/favorite-marin-cycling-routes/\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">marinbike.org<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Marin Headlands Loop\" data-type=\"Bike Route\" data-lat=\"37.906\" data-lon=\"-122.545\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#E65100;font-size:13px\">🚴 Mount Tamalpais via Alpine Dam<\/b><br><span style=\"font-size:11px;color:#666\">Base: San Francisco / East Bay<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Distance<\/td><td><b>40.6 mi loop<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Elev gain<\/td><td><b>significant<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Surface<\/td><td><b style=\"color:#E65100\">Mixed<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Difficulty<\/td><td><b>Hard<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Bike type<\/td><td><b>Gravel ideal<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Mt. Tamalpais is the prettiest of the Bay Area mountains. Alpine Dam loop + Muir Woods + East Peak views across the whole Bay Area and Pacific.<\/p><a href=\"https://pjammcycling.com/zone/316.Cycling-Mount-Tamalpais-all-routes-to-the-top\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">pjammcycling.com<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Mount Tamalpais via Alpine Dam\" data-type=\"Bike Route\" data-lat=\"37.974\" data-lon=\"-122.531\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#E65100;font-size:13px\">🚴 Point Reyes via Bear Valley Road<\/b><br><span style=\"font-size:11px;color:#666\">Base: San Francisco / East Bay<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Distance<\/td><td><b>25–30 mi RT<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Elev gain<\/td><td><b>moderate<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Surface<\/td><td><b style=\"color:#E65100\">Mixed<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Difficulty<\/td><td><b>Easy–Moderate<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Bike type<\/td><td><b>Gravel ideal<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Gravel bike unlocks both the paved road and Bear Valley Trail into the Seashore — coastal dairy farmland, tule elk sightings, dramatic headlands. Best in morning light.<\/p><a href=\"https://www.nps.gov/pore/planyourvisit/biking.htm\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">nps.gov/pore<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Point Reyes via Bear Valley Road\" data-type=\"Bike Route\" data-lat=\"38.072\" data-lon=\"-122.801\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#1B5E20;font-size:13px\">🚴 Newton B. Drury Scenic Parkway<\/b><br><span style=\"font-size:11px;color:#666\">Base: Redwoods NP<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Distance<\/td><td><b>20 mi RT<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Elev gain<\/td><td><b>minimal<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Surface<\/td><td><b style=\"color:#1B5E20\">Paved<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Difficulty<\/td><td><b>Easy<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Bike type<\/td><td><b>Any bike<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">On the 1st Saturday Nov–May, parkway is CLOSED TO CARS — old-growth redwood cathedral entirely to yourself. Minimal traffic on other days, intimate grove access.<\/p><a href=\"https://www.nps.gov/redw/planyourvisit/bikes.htm\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">nps.gov/redw<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Newton B. Drury Scenic Parkway\" data-type=\"Bike Route\" data-lat=\"41.364\" data-lon=\"-124.022\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#1B5E20;font-size:13px\">🚴 Avenue of the Giants (cycling)<\/b><br><span style=\"font-size:11px;color:#666\">Base: Redwoods NP<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Distance<\/td><td><b>32 mi RT<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Elev gain<\/td><td><b>~1,780 ft<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Surface<\/td><td><b style=\"color:#1B5E20\">Paved<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Difficulty<\/td><td><b>Easy<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Bike type<\/td><td><b>Any bike<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">One of the most beautiful roads in North America — 32 miles beneath the largest coastal redwood forest. Virtually no car traffic (freeway handles through-traffic).<\/p><a href=\"https://www.savetheredwoods.org/blog/path/four-bike-rides-through-the-redwoods/\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">savetheredwoods.org<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Avenue of the Giants (cycling)\" data-type=\"Bike Route\" data-lat=\"40.261\" data-lon=\"-123.812\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#1B5E20;font-size:13px\">🚴 Three Capes Scenic Loop<\/b><br><span style=\"font-size:11px;color:#666\">Base: Oregon Coast (Tillamook / Cannon Beach area)<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Distance<\/td><td><b>33 mi 1-way / 69 mi loop<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Elev gain<\/td><td><b>2,560–3,055 ft<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Surface<\/td><td><b style=\"color:#1B5E20\">Paved<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Difficulty<\/td><td><b>Moderate<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Bike type<\/td><td><b>Road or gravel<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Best reason to cycle the Oregon coast. Secondary roads hug the actual shoreline (bypassing Hwy 101) — Cape Meares Lighthouse, hidden beaches, Oceanside, Netarts, Pacific City.<\/p><a href=\"https://bestrides.org/three-capes-ride/\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">bestrides.org<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Three Capes Scenic Loop\" data-type=\"Bike Route\" data-lat=\"45.456\" data-lon=\"-123.845\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:280px\"><b style=\"color:#E65100;font-size:13px\">🚴 Nestucca River Road<\/b><br><span style=\"font-size:11px;color:#666\">Base: Oregon Coast (Tillamook / Cannon Beach area)<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Distance<\/td><td><b>48 mi 1-way<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Elev gain<\/td><td><b>~2,500 ft<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Surface<\/td><td><b style=\"color:#E65100\">Mixed<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Difficulty<\/td><td><b>Moderate<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Bike type<\/td><td><b>Gravel recommended<\/b><\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">BikePortland's top Oregon route. So steep and narrow it actively discourages cars — quiet river-canyon ride through Coast Range forest with almost zero traffic.<\/p><a href=\"https://bikeportland.
