e=\"color:#888;padding:1px 6px 1px 0\">Nearest base<\/td><td><b>Santa Barbara / San Diego<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Drive<\/td><td>~1.5 hrs from SB via Ventura (boat from Ventura)<\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Est.<\/td><td>1980 &nbsp;·&nbsp; 390 sq mi<\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Five Channel Islands off SB/Ventura coast — sea caves, giant kelp, endemic species. Day trips via Island Packers ferry. Scorpion Cove snorkeling. Book well ahead.<\/p><p style=\"font-size:10px;color:#666;margin:2px 0\"><b>Permits/access:<\/b> Park entry free. Island Packers ferry required — $59–79 RT. Snorkel tour extra. Book 4–6 weeks ahead in summer.<\/p><a href=\"https://www.nps.gov/chis\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.nps.gov/chis<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Channel Islands NP\" data-type=\"National Park\" data-lat=\"33.988\" data-lon=\"-119.44\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:290px\"><b style=\"color:#2E7D32;font-size:13px\">🌲 Pinnacles NP<\/b><br><span style=\"font-size:11px;font-weight:bold;color:#2E7D32\">Day trip<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Nearest base<\/td><td><b>SLO / Big Sur / Carmel<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Drive<\/td><td>~1 hr from SLO or Monterey<\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Est.<\/td><td>2013 &nbsp;·&nbsp; 42 sq mi<\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">California condors (75+ birds visible!), volcanic rock spires, cave systems. Smallest and least-visited CA NP — no crowds. Two entrances; west entrance is easier from SLO.<\/p><p style=\"font-size:10px;color:#666;margin:2px 0\"><b>Permits/access:<\/b> No permit. $35/vehicle. West entrance from Hwy 101 near King City. Check road status — one entrance closes seasonally.<\/p><a href=\"https://www.nps.gov/pinn\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.nps.gov/pinn<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Pinnacles NP\" data-type=\"National Park\" data-lat=\"36.491\" data-lon=\"-121.198\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:290px\"><b style=\"color:#F57F17;font-size:13px\">🌲 Yosemite NP<\/b><br><span style=\"font-size:11px;font-weight:bold;color:#F57F17\">Detour (worth it)<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Nearest base<\/td><td><b>San Francisco / East Bay<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Drive<\/td><td>~3 hrs from SF (get there early or stay overnight)<\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Est.<\/td><td>1890 &nbsp;·&nbsp; 1169 sq mi<\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Half Dome, El Capitan, Yosemite Falls, Tuolumne Meadows. One of the greatest landscapes on Earth. Extremely busy in summer — timed entry permit required May–Sep. Book at recreation.gov 3 months ahead.<\/p><div style=\"background:#FFF3E0;border-left:3px solid #E65100;padding:4px 6px;margin:4px 0;font-size:10px;color:#BF360C\">⚠ Timed entry permit REQUIRED May–Sep. Book at recreation.gov up to 3 months ahead. Fills in minutes on release date. $35/vehicle.<\/div><a href=\"https://www.nps.gov/yose\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.nps.gov/yose<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Yosemite NP\" data-type=\"National Park\" data-lat=\"37.865\" data-lon=\"-119.538\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:290px\"><b style=\"color:#BF360C;font-size:13px\">🌲 Lassen Volcanic NP<\/b><br><span style=\"font-size:11px;font-weight:bold;color:#BF360C\">Big detour<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Nearest base<\/td><td><b>Redwoods NP<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Drive<\/td><td>~3.5 hrs from Redwoods / Eureka<\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Est.<\/td><td>1916 &nbsp;·&nbsp; 106 sq mi<\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Active volcanic plateau — boiling springs, colourful hydrothermal lakes, lava fields, cinder cones. Major eruption 1914–17. Completely unique landscape. Virtually no crowds.<\/p><p style=\"font-size:10px;color:#666;margin:2px 0\"><b>Permits/access:<\/b> No permit. $35/vehicle. Manzanita Lake entrance from Hwy 89. Check snow closures.<\/p><a href=\"https://www.nps.gov/lavo\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.nps.gov/lavo<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Lassen Volcanic NP\" data-type=\"National Park\" data-lat=\"40.492\" data-lon=\"-121.508\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:290px\"><b style=\"color:#1B5E20;font-size:13px\">🌲 Redwood NP & State Parks<\/b><br><span style=\"font-size:11px;font-weight:bold;color:#1B5E20\">On route<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Nearest base<\/td><td><b>Redwoods NP (on route)<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Drive<\/td><td>On route — main stop<\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Est.<\/td><td>1968 &nbsp;·&nbsp; 139 sq mi<\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">World's tallest trees (379 ft record). Fern Canyon (Jurassic Park). Prairie Creek elk meadows. Newton B. Drury Scenic Parkway. Free to enter most areas.<\/p><p style=\"font-size:10px;color:#666;margin:2px 0\"><b>Permits/access:<\/b> Free for most areas. Some state park sections charge $8/vehicle. No permit for day use.<\/p><a href=\"https://www.nps.gov/redw\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.nps.gov/redw<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Redwood NP & State Parks\" data-type=\"National Park\" data-lat=\"41.3\" data-lon=\"-124.002\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:290px\"><b style=\"color:#BF360C;font-size:13px\">🌲 Crater Lake NP<\/b><br><span style=\"font-size:11px;font-weight:bold;color:#BF360C\">Big detour<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Nearest base<\/td><td><b>Big detour from Oregon coast<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Drive<\/td><td>~4 hrs from Crater Lake from Oregon coast (big inland detour)<\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Est.<\/td><td>1902 &nbsp;·&nbsp; 286 sq mi<\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Deepest lake in the US (1,943 ft) — unreal cobalt blue. Wizard Island, Phantom Ship. Snow possible even in July at 7,000 ft elevation. 4 hrs from the OR coast — big detour but genuinely iconic.<\/p><p style=\"font-size:10px;color:#666;margin:2px 0\"><b>Permits/access:<\/b> No permit. $35/vehicle. Open Jun–Oct (heavy snow rest of year). Rim Drive (33 miles) is spectacular.<\/p><a href=\"https://www.nps.gov/crla\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.nps.gov/crla<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Crater Lake NP\" data-type=\"National Park\" data-lat=\"42.944\" data-lon=\"-122.109\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:290px\"><b style=\"color:#2E7D32;font-size:13px\">🌲 Olympic NP<\/b><br><span style=\"font-size:11px;font-weight:bold;color:#2E7D32\">Day trip<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Nearest base<\/td><td><b>Seattle<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Drive<\/td><td>~2 hrs from Seattle (ferry + drive)<\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Est.<\/td><td>1938 &nbsp;·&nbsp; 1442 sq mi<\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Hoh Rainforest (temperate rainforest), Hurricane Ridge (360° mountain views), Rialto Beach (sea stacks), Lake Crescent (turquoise alpine lake). Enormous and diverse — needs 2+ days.<\/p><p style=\"font-size:10px;color:#666;margin:2px 0\"><b>Permits/access:<\/b> No permit for day use. $35/vehicle (7-day). Highly recommend 2-day itinerary to cover Hoh + Hurricane Ridge + coast.<\/p><a href=\"https://www.nps.gov/olym\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.nps.gov/olym<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Olympic NP\" data-type=\"National Park\" data-lat=\"47.802\" data-lon=\"-123.498\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:290px\"><b style=\"color:#2E7D32;font-size:13px\">🌲 Mt. Rainier NP<\/b><br><span style=\"font-size:11px;font-weight:bold;color:#2E7D32\">Day trip<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Nearest base<\/td><td><b>Seattle<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Drive<\/td><td>~2 hrs from Seattle<\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Est.<\/td><td>1899 &nbsp;·&nbsp; 369 sq mi<\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Massive stratovolcano, year-round snow and glaciers, wildflower meadows at Paradise (Jul). Full-face Rainier view from multiple viewpoints. ~2 hrs from Seattle. NOT close to Portland (2.5–3 hrs).<\/p><p style=\"font-size:10px;color:#666;margin:2px 0\"><b>Permits/access:<\/b> No permit. $35/vehicle. Paradise area: arrive before 9am or after 4pm in summer. Sunrise area (east) is less crowded.<\/p><a href=\"https://www.nps.gov/mora\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.nps.gov/mora<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"Mt. Rainier NP\" data-type=\"National Park\" data-lat=\"46.853\" data-lon=\"-121.726\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>","<div style=\"font-family:sans-serif;max-width:290px\"><b style=\"color:#2E7D32;font-size:13px\">🌲 North Cascades NP<\/b><br><span style=\"font-size:11px;font-weight:bold;color:#2E7D32\">Day trip<\/span><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><table style=\"font-size:11px;border-collapse:collapse;width:100%\"><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Nearest base<\/td><td><b>Seattle<\/b><\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Drive<\/td><td>~2.5 hrs from Seattle<\/td><\/tr><tr><td style=\"color:#888;padding:1px 6px 1px 0\">Est.<\/td><td>1968 &nbsp;·&nbsp; 789 sq mi<\/td><\/tr><\/table><hr style=\"margin:5px 0;border:none;border-top:1px solid #eee\"><p style=\"font-size:11px;color:#444;margin:3px 0;line-height:1.5\">Most rugged and remote NP in the lower 48 — jagged peaks, turquoise glacial lakes, no paved road through the park. North Cascades Hwy (Hwy 20) for views. ~2.5 hrs from Seattle.<\/p><p style=\"font-size:10px;color:#666;margin:2px 0\"><b>Permits/access:<\/b> No permit. $35/vehicle. North Cascades Hwy (Hwy 20) is free to drive — spectacular even without hiking. Road closes Nov–Apr.<\/p><a href=\"https://www.nps.gov/noca\" target=\"_blank\" style=\"font-size:10px;color:#1976D2\">https://www.nps.gov/noca<\/a><hr style=\"margin:6px 0;border:none;border-top:1px solid #f0f0f0\"><button class=\"plan-btn\" data-name=\"North Cascades NP\" data-type=\"National Park\" data-lat=\"48.7\" data-lon=\"-121.076\" style=\"width:100%;padding:4px 0;background:#FFFDE7;border:1px solid #FBC02D;border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold\">⭐ Add to plan<\/button><\/div>"],null,["🌲 Joshua Tree NP · Day trip","🌲 Channel Islands NP · Day trip","🌲 Pinnacles NP · Day trip","🌲 Yosemite NP · Detour (worth it)","🌲 Lassen Volcanic NP · Big detour","🌲 Redwood NP &amp; State Parks · On route","🌲 Crater Lake NP · Big detour","🌲 Olympic NP · Day trip","🌲 Mt. Rainier NP · Day trip","🌲 North Cascades NP · Day trip"],{"interactive":false,"permanent":false,"direction":"auto","opacity":1,"offset":[0,0],"textsize":"10px","textOnly":false,"className":"","sticky":true},null]},{"method":"addCircles","args":[34.1,-119.85,45000,null,"Whale Zone",{"interactive":true,"className":"","stroke":true,"color":"#00796B","weight":2,"opacity":0.5,"fill":true,"fillColor":"#4DB6AC","fillOpacity":0.12,"dashArray":"4,4"},"<b>Santa Barbara Channel — Whale Watching<\/b><br><b style='color:#0277BD'>🐋 BLUE WHALES<\/b> Jun–Oct (peak Jun–Jul) — largest animals ever to exist<br>Also: Humpback, Fin, Minke, Grey whales<br><br><b>Condor Express<\/b> — 3.5 hr pelagic tours from SB Harbor<br>~$89–109/person · condorexpress.com<br>Book ahead — fills fast in June",null,null,{"interactive":false,"permanent":false,"direction":"auto","opacity":1,"offset":[0,0],"textsize":"10px","textOnly":false,"className":"","sticky":true},null,null]},{"me sb-clear\" style=\"flex:1;padding:3px 0;font-size:10px;background:#FFEBEE;' +\n          'border:1px solid #FFCDD2;border-radius:5px;cursor:pointer;\">\\uD83D\\uDDD1 Clear all<\/button>' +\n      '<\/div>' +\n    '<\/div>';\n  el.appendChild(sb);\n\n  document.getElementById('sb-hdr').onclick = function() {\n    var b = document.getElementById('sb-body');\n    var t = document.getElementById('sb-tog');\n    b.style.display = b.style.display === 'none' ? 'block' : 'none';\n    t.textContent   = b.style.display === 'none' ? '\\u25BC' : '\\u25B2';\n  };\n\n  var typeCol = {\n    'Main Stop':'#1976D2','Hike':'#C62828','Bike Route':'#2E7D32',\n    'Bike Rental':'#6A1B9A','Day Trip':'#E65100','Optional':'#F57F17'\n  };\n\n  function savePlan()  { try { localStorage.setItem('wctrip_plan', JSON.stringify(plan)); } catch(e){} }\n  function isInPlan(n) { return plan.some(function(i){ return i.name === n; }); }\n\n  function renderPlan() {\n    var list  = document.getElementById('sb-list');\n    var count = document.getElementById('sb-count');\n    count.textContent = plan.length;\n    if (!plan.length) {\n      list.innerHTML = '<p style=\"color:#bbb;font-size:11px;text-align:center;padding:10px 0\">' +\n        'Click \\u2B50 on any marker<br>to add to your plan<\/p>';\n      return;\n    }\n    list.innerHTML = plan.map(function(item, i) {\n      var c = typeCol[item.type] || '#555';\n      return '<div style=\"padding:4px 2px;border-bottom:1px solid #f5f5f5;display:flex;align-items:center;gap:3px;\">' +\n        '<div style=\"flex:1;min-width:0;\">' +\n          '<div style=\"font-size:9px;color:' + c + ';font-weight:bold;text-transform:uppercase;letter-spacing:.4px\">' + item.type + '<\/div>' +\n          '<div style=\"font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">' + item.name + '<\/div>' +\n        '<\/div>' +\n        '<button data-rm=\"' + i + '\" style=\"background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0\">\\u00d7<\/button>' +\n      '<\/div>';\n    }).join('');\n    list.querySelectorAll('[data-rm]').forEach(function(btn) {\n      btn.onclick = function() {\n        plan.splice(parseInt(this.getAttribute('data-rm')), 1);\n        savePlan(); renderPlan();\n      };\n    });\n  }\n\n  document.getElementById('sb-copy').onclick = function() {\n    if (!plan.length) { alert('Your plan is empty!'); return; }\n    var txt = 'West Coast Trip \\u2014 My Plan\\n' +\n      '='.repeat(30) + '\\n' +\n      plan.map(function(it, i){ return (i+1) + '. [' + it.type + '] ' + it.name; }).join('\\n');\n    if (navigator.clipboard) {\n      navigator.clipboard.writeText(txt).then(function() {\n        var b = document.getElementById('sb-copy');\n        b.textContent = '\\u2713 Copied!';\n        setTimeout(function(){ b.textContent = '\\uD83D\\uDCCB Copy list'; }, 2000);\n      });\n    }\n  };\n\n  document.getElementById('sb-clear').onclick = function() {\n    if (!plan.length) return;\n    if (confirm('Clear all ' + plan.length + ' items from your plan?')) {\n      plan = []; savePlan(); renderPlan();\n    }\n  };\n\n  // Event delegation — catches clicks on any .plan-btn inside any popup\n  el.addEventListener('click', function(e) {\n    var btn = e.target.closest ? e.target.closest('.plan-btn') : null;\n    if (!btn) return;\n    var name = btn.getAttribute('data-name');\n    var idx  = plan.findIndex(function(i){ return i.name === name; });\n    if (idx > -1) {\n      plan.splice(idx, 1);\n      btn.textContent         = '\\u2B50 Add to plan';\n      btn.style.background    = '#FFFDE7';\n      btn.style.borderColor   = '#FBC02D';\n    } else {\n      plan.push({\n        name: name,\n        type: btn.getAttribute('data-type'),\n        lat:  parseFloat(btn.getAttribute('data-lat')),\n        lon:  parseFloat(btn.getAttribute('data-lon'))\n      });\n      btn.textContent       = '\\u2605 In plan';\n      btn.style.background  = '#FFF3E0';\n      btn.style.borderColor = '#FB8C00';\n    }\n    savePlan(); renderPlan();\n  });\n\n  // Sync button state whenever a popup opens\n  map.on('popupopen', function(e) {\n    var pop = e.popup.getElement();\n    if (!pop) return;\n    pop.querySelectorAll('.plan-btn').forEach(function(btn) {\n      if (isInPlan(btn.getAttribute('data-name'))) {\n        btn.textContent       = '\\u2605 In plan';\n        btn.style.background  = '#FFF3E0';\n        btn.style.borderColor = '#FB8C00';\n      } else {\n        btn.textContent       = '\\u2B50 Add to plan';\n        btn.style.background  = '#FFFDE7';\n        btn.style.borderColor = '#FBC02D';\n      }\n    });\n  });\n\n  renderPlan();\n}\n).call(this.getMap(), el, x, data);\n}","data":null}]}}</script>
